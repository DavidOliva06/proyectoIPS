name: CD

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      include_latest:
        description: "Also push the :latest tag"
        required: false
        type: boolean
        default: true

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # The deploy gate. Same pipeline as PRs run, reused rather than re-declared,
  # so nothing can ship on a definition of "green" that PRs were not held to.
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Build and push image
    needs: ci
    runs-on: ubuntu-latest
    # Wire branch/reviewer protection rules to this environment in
    # Settings > Environments > production.
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: compute
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INCLUDE_LATEST: ${{ github.event.inputs.include_latest }}
        run: |
          set -euo pipefail

          # GHCR rejects uppercase in image paths; the owner/repo may contain it.
          IMAGE="ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
          SHA="$(git rev-parse --short HEAD)"

          if [[ "$REF_TYPE" == "tag" ]]; then
            # Release: v1.2.3 -> :1.2.3, :1.2, :1 (+ :latest unless prerelease)
            VERSION="${REF_NAME#v}"
            MAJOR="$(echo "$VERSION" | cut -d. -f1)"
            MINOR="$(echo "$VERSION" | cut -d. -f2)"

            TAGS="$IMAGE:$VERSION"
            if [[ "$VERSION" != *-* ]]; then
              TAGS="$TAGS,$IMAGE:${MAJOR}.${MINOR},$IMAGE:${MAJOR}"
              if [[ "$INCLUDE_LATEST" != "false" ]]; then
                TAGS="$TAGS,$IMAGE:latest"
              fi
            fi
          else
            # Continuous deploy off master. :latest stays a release-only tag, so
            # a mainline push can never masquerade as the newest release.
            TAGS="$IMAGE:$REF_NAME,$IMAGE:sha-$SHA"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Computed tags: $TAGS"

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.compute.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Deployed"
            echo ""
            echo '```'
            echo "${{ steps.compute.outputs.tags }}" | tr ',' '\n'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
