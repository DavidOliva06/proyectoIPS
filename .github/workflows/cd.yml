name: CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABASE_URL: "postgresql://localhost:5432/dummy"
  SKIP_DB_CHECK: 1
  CYPRESS_INSTALL_BINARY: 0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect build script
        id: scripts
        run: |
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const scripts=pkg.scripts||{};const out=process.env.GITHUB_OUTPUT;fs.appendFileSync(out,`build=${Boolean(scripts.build)}\n`);"

      - name: Build
        if: steps.scripts.outputs.build == 'true'
        run: pnpm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    environment: production

    steps:
      - name: Deployment placeholder
        run: |
          echo "Build completed successfully."
          echo "Configure provider-specific deployment steps (Vercel/Netlify/Render/GitHub Pages)"
          echo "using repository secrets in this job before enabling production deploy."

      - name: Validate optional deploy secrets
        run: |
          echo "::notice title=CD setup::Set DEPLOY_PROVIDER and DEPLOY_TOKEN secrets to enable real deployment commands."
