name: Security

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    # Weekly, so newly-disclosed CVEs surface even when nobody is pushing.
    - cron: "0 6 * * 1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # No `cache: pnpm` here: this job audits the lockfile and never runs
      # `pnpm install`, so there is no store to save and the post-run cache step
      # fails trying to find one.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Blocks on high/critical in *runtime* dependencies only. Vulnerabilities
      # reachable solely through jest, cypress or the rollup toolchain never
      # reach a user, and gating on them would mean a permanently red pipeline
      # that everyone learns to ignore — which is worse than no gate.
      - name: pnpm audit (production)
        run: pnpm audit --prod --audit-level high

      # Dev-tree findings are surfaced but do not fail the build; Dependabot
      # raises the PRs for them.
      - name: pnpm audit (full tree, advisory)
        if: always()
        continue-on-error: true
        run: pnpm audit --audit-level high

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans history, not just the tip commit.
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v3
