name: CI

on:
  push:
    # develop is the team's integration branch; feature/** covers work branched
    # straight off master. master is deliberately absent: pushes there run this
    # pipeline through cd.yml's gate instead, so a merge produces one CI run
    # rather than two racing ones.
    branches:
      - develop
      - "feature/**"
  pull_request:
    branches:
      - master
      - main
  # Lets cd.yml reuse this exact pipeline as its deploy gate, so "CI is green"
  # and "we deployed" can never mean two different sets of checks.
  workflow_call:

# A newer push to the same branch/PR cancels the previous run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"
  SKIP_DB_CHECK: 1
  DISABLE_TELEMETRY: 1

jobs:
  verify:
    # Referenced by name in branch protection — see scripts/protect-branch.sh.
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The Prisma client is generated code that is not committed. Lint,
      # typecheck and tests all resolve imports against it, so it must exist
      # before any of them run.
      - name: Generate Prisma client
        run: pnpm build-db-client

      - name: Lint & format check
        run: pnpm lint:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Publish coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e '
              const t = require("./coverage/coverage-summary.json").total;
              const row = k => `| ${k} | ${t[k].pct}% | ${t[k].covered}/${t[k].total} |`;
              console.log("## Coverage\n");
              console.log("| Metric | % | Covered |");
              console.log("|---|---|---|");
              console.log(["statements","branches","functions","lines"].map(row).join("\n"));
            ' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Build
        run: pnpm build
