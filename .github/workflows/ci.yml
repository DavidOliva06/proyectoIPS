name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  DATABASE_URL: "postgresql://localhost:5432/dummy"
  SKIP_DB_CHECK: 1
  CYPRESS_INSTALL_BINARY: 0

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect available scripts
        id: scripts
        run: |
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const scripts=pkg.scripts||{};const out=process.env.GITHUB_OUTPUT;fs.appendFileSync(out,`lint=${Boolean(scripts.lint)}\n`);fs.appendFileSync(out,`typecheck=${Boolean(scripts.typecheck)}\n`);fs.appendFileSync(out,`test=${Boolean(scripts.test)}\n`);fs.appendFileSync(out,`build=${Boolean(scripts.build)}\n`);"

      - name: Lint
        if: steps.scripts.outputs.lint == 'true'
        run: pnpm run lint

      - name: Typecheck
        if: steps.scripts.outputs.typecheck == 'true'
        run: pnpm run typecheck

      - name: Test (CI)
        if: steps.scripts.outputs.test == 'true'
        run: pnpm run test --ci --passWithNoTests

      - name: Build
        if: steps.scripts.outputs.build == 'true'
        run: pnpm run build
